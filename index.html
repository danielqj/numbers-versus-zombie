<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Numbers Versus Zombie</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="game-shell">
    <section class="hud" aria-label="游戏状态">
      <div>
        <p class="label">分数</p>
        <strong id="score">0</strong>
      </div>
      <div>
        <p class="label">堡垒生命</p>
        <strong id="baseHealth">100</strong>
      </div>
      <div>
        <p class="label">连续答对</p>
        <strong id="streak">0</strong>
      </div>
      <div>
        <p class="label">模式</p>
        <strong id="waveLabel">准备</strong>
      </div>
    </section>

    <section class="arena-wrap" aria-label="游戏区域">
      <canvas id="gameCanvas" width="1100" height="560" aria-label="乘法僵尸游戏画面"></canvas>
      <div id="overlay" class="overlay">
        <h1>Numbers Versus Zombie</h1>
        <p>输入僵尸头顶乘法题的答案，保护右边的堡垒。连续答对 5 题会获得 5 分奖励，达到 100 分人类获胜。</p>
        <button id="startButton" type="button">开始训练</button>
      </div>
    </section>

    <section class="control-panel" aria-label="游戏控制">
      <form id="answerForm" class="answer-form">
        <label for="answerInput">答案</label>
        <input id="answerInput" inputmode="numeric" autocomplete="off" placeholder="例如 12" disabled>
        <button id="submitButton" type="submit" disabled>发射</button>
      </form>

      <div class="difficulty">
        <label for="difficultyRange">难度</label>
        <input id="difficultyRange" type="range" min="1" max="5" value="2">
        <span id="difficultyText">普通</span>
      </div>

      <button id="resetButton" class="ghost-button" type="button">重新开始</button>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
